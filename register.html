<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IronTribe CrossFit - Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
          <div class="auth-card text-center">
            <div class="surface p-4 p-lg-5 text-start">
              <a href="index.html">
                <img src="assets/images/logo.svg" alt="IronTribe CrossFit" class="auth-logo">
              </a>
              <h3 class="h-display" style="text-align: center;">Create account</h3>
              <form class="row g-3 mt-1">
                <div class="col-md-6">
                  <label class="form-label">First name</label>
                  <input class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Last name</label>
                  <input class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone</label>
                  <input class="form-control" placeholder="Optional">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Plan</label>
                  <select class="form-select">
                    <option>Starter</option>
                    <option selected>Unlimited</option>
                    <option>Athlete</option>
                  </select>
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms">I agree to the terms (UI)</label>
                  </div>
                </div>
                <div class="col-12">
                  <button class="btn btn-brand btn-lg w-100" type="submit">Create account</button>

                  <div class="position-relative my-4">
                    <hr class="hr-steel">
                    <span
                      class="position-absolute top-50 start-50 translate-middle px-3 surface text-white-50 small">OR</span>
                  </div>

                  <div class="d-grid gap-2">
                    <a href="#"
                      class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4"
                          d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" />
                        <path fill="#34A853"
                          d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" />
                        <path fill="#FBBC05"
                          d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.96H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.041l3.007-2.334z" />
                        <path fill="#EA4335"
                          d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" />
                      </svg>
                      Sign up with Google
                    </a>
                    <a href="#"
                      class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        class="bi bi-apple" viewBox="0 0 16 16">
                        <path
                          d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516.024.034 1.52.087 2.475-1.258.955-1.345.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422.212-2.189 1.675-2.789 1.698-2.854.023-.065-.097-.369-.313-.579-.216-.21-.52-.42-.857-.594-.336-.174-.68-.268-1.026-.268-.344 0-1.22.23-1.638.23-.418 0-1.16-.23-1.62-.23-.46 0-1.298.234-1.84.594-.541.36-1.07.864-1.353 1.36-.282.496-.482 1.29-.482 2.189 0 .899.23 2.189.658 3.013.428.824 1.132 1.75 1.84 2.258.707.508 1.414.234 1.84.234.426 0 .945.274 1.62.274.675 0 1.218-.274 1.62-.274.402 0 1.163.274 1.84-.234.676-.508 1.414-1.434 1.84-2.258.428-.824.658-2.114.658-3.013 0-.014 0-.03-.002-.045" />
                      </svg>
                      Sign up with Apple
                    </a>
                  </div>
                </div>
              </form>
              <hr class="hr-steel my-4">
              <div class="text-center text-theme-muted">Already a member? <a class="nav-link d-inline p-0 text-brand"
                  href="login.html">Sign in</a>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="themeToggle" class="btn btn-sm btn-ghost position-fixed top-0 end-0 m-3" type="button"
    aria-pressed="false">Dark</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
